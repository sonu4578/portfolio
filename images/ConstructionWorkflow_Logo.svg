<svg xmlns="http://www.w3.org/2000/svg" width="502" height="208" viewBox="0 0 502 208">
  <!-- Background -->
  <rect width="502" height="208" fill="#ffffff"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="208" fill="#E67E22"/>

  <!-- Icon group, centered in left ~180px zone -->
  <g transform="translate(30, 20)">

    <!-- Crane mast (vertical) -->
    <rect x="62" y="20" width="10" height="110" rx="2" fill="#E67E22"/>

    <!-- Crane jib (horizontal top arm) -->
    <rect x="30" y="20" width="90" height="8" rx="2" fill="#E67E22"/>

    <!-- Counter-jib (short left arm) -->
    <rect x="18" y="20" width="16" height="6" rx="2" fill="#c0392b" opacity="0.7"/>

    <!-- Crane hook cable -->
    <line x1="100" y1="28" x2="100" y2="72" stroke="#7f8c8d" stroke-width="2"/>
    <!-- Hook -->
    <path d="M96,72 Q92,80 100,82 Q108,80 104,72" fill="none" stroke="#7f8c8d" stroke-width="2"/>

    <!-- Building — left block -->
    <rect x="22" y="108" width="36" height="60" rx="3" fill="#2c3e50"/>
    <!-- Windows left block -->
    <rect x="28" y="116" width="8" height="8" rx="1" fill="#5dade2"/>
    <rect x="42" y="116" width="8" height="8" rx="1" fill="#5dade2"/>
    <rect x="28" y="132" width="8" height="8" rx="1" fill="#5dade2"/>
    <rect x="42" y="132" width="8" height="8" rx="1" fill="#5dade2"/>
    <rect x="28" y="148" width="8" height="8" rx="1" fill="#5dade2"/>
    <rect x="42" y="148" width="8" height="8" rx="1" fill="#5dade2"/>

    <!-- Building — right block (taller) -->
    <rect x="66" y="88" width="44" height="80" rx="3" fill="#34495e"/>
    <!-- Windows right block -->
    <rect x="72" y="96" width="9" height="9" rx="1" fill="#5dade2"/>
    <rect x="87" y="96" width="9" height="9" rx="1" fill="#5dade2"/>
    <rect x="72" y="112" width="9" height="9" rx="1" fill="#5dade2"/>
    <rect x="87" y="112" width="9" height="9" rx="1" fill="#5dade2"/>
    <rect x="72" y="128" width="9" height="9" rx="1" fill="#5dade2"/>
    <rect x="87" y="128" width="9" height="9" rx="1" fill="#5dade2"/>
    <rect x="72" y="144" width="9" height="9" rx="1" fill="#f39c12"/>
    <rect x="87" y="144" width="9" height="9" rx="1" fill="#5dade2"/>

    <!-- Ground line -->
    <line x1="10" y1="168" x2="130" y2="168" stroke="#bdc3c7" stroke-width="2"/>

  </g>

  <!-- Divider line -->
  <line x1="178" y1="30" x2="178" y2="178" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Text -->
  <text x="198" y="78" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="28" fill="#2c3e50">Construction</text>
  <text x="198" y="114" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="28" fill="#2c3e50">Workflow</text>
  <text x="200" y="145" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="17" fill="#E67E22">Platform</text>
</svg>
