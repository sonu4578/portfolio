<svg xmlns="http://www.w3.org/2000/svg" width="502" height="208" viewBox="0 0 502 208">
  <rect width="502" height="208" fill="#f0f4f8"/>

  <!-- Hard hat icon -->
  <g transform="translate(60, 44)">
    <!-- Hat dome -->
    <path d="M60 80 Q10 80 10 50 Q10 15 60 10 Q110 15 110 50 Q110 80 60 80Z" fill="#F5A623" stroke="#E09010" stroke-width="2"/>
    <!-- Hat brim -->
    <rect x="0" y="72" width="120" height="14" rx="7" fill="#F5A623" stroke="#E09010" stroke-width="2"/>
    <!-- Hat band -->
    <rect x="10" y="55" width="100" height="10" rx="4" fill="#E09010"/>
    <!-- Ventilation stripe -->
    <rect x="55" y="10" width="10" height="45" rx="3" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Project name -->
  <text x="210" y="88" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="26" fill="#2c3e50">Construction</text>
  <text x="210" y="122" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="26" fill="#2c3e50">Workflow</text>
  <text x="210" y="152" font-family="Poppins, Arial, sans-serif" font-weight="400" font-size="16" fill="#7f8c8d">Platform</text>
</svg>
